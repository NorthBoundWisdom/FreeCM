name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-test:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep Python's supported-version boundary on Linux, then exercise
          # platform-specific paths on the current interpreter.
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python package
        run: python -m pip install -e .

      - name: Check version metadata
        run: python scripts/check-version-consistency.py

      - name: Compile Python sources
        run: python -m compileall -q freecm repomgrcpp repomgrswift repomgrandroid repomgrdotnet tools hooks scripts tests

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

  python-quality:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python package with development tools
        run: python -m pip install -e ".[dev]"

      - name: Type check Python sources
        run: python -m mypy

      - name: Lint Python sources
        run: python -m ruff check freecm repomgrcpp repomgrswift repomgrandroid repomgrdotnet tools hooks scripts tests

      - name: Check Python formatting
        run: python -m black --check freecm repomgrcpp repomgrswift repomgrandroid repomgrdotnet tools hooks scripts tests

      - name: Test with coverage
        run: |
          python -m coverage run -m unittest discover -s tests -v
          python -m coverage report

      - name: Security scan Python code
        run: python -m bandit -q -r freecm repomgrcpp repomgrswift repomgrandroid repomgrdotnet tools hooks scripts

      - name: Audit Python dependencies
        run: python -m pip_audit . --progress-spinner off

  cmake-coverage:
    name: Native CMake coverage integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install GCC and Clang coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++ lcov clang llvm

      - name: Run native CMake coverage integrations
        env:
          FREECM_RUN_NATIVE_COVERAGE_TESTS: "1"
        run: python3 -m unittest discover -s tests -p test_cmake_tools.py -v

  vscode-test:
    name: VS Code (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node 20 verifies the supported baseline. Node 22 verifies the
          # current toolchain on every platform where the extension runs.
          - os: ubuntu-latest
            node-version: "20"
          - os: ubuntu-latest
            node-version: "22"
          - os: macos-latest
            node-version: "22"
          - os: windows-latest
            node-version: "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile VS Code extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Run VS Code extension tests on Linux
        if: runner.os == 'Linux'
        working-directory: vscode-extension
        env:
          FREECM_TEST_PYTHON: python
          FREECM_TEST_VSCODE_VERSION: "1.129.1"
        run: xvfb-run -a npm test

      - name: Run VS Code extension tests
        if: runner.os != 'Linux'
        working-directory: vscode-extension
        env:
          FREECM_TEST_PYTHON: python
          FREECM_TEST_VSCODE_VERSION: "1.129.1"
        run: npm test

  extension-audit:
    name: VS Code dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Audit VS Code extension dependencies
        working-directory: vscode-extension
        run: npm audit --omit=optional

  package-smoke:
    name: Package smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install build
          python -m build

      - name: Smoke test wheel
        run: |
          python scripts/smoke_installed_wheel.py --dist-dir dist

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package

      - name: Inspect, install, and activate packaged VSIX
        working-directory: vscode-extension
        env:
          FREECM_SMOKE_VSCODE_VERSION: "1.129.1"
        run: xvfb-run -a npm run smoke:vsix

  whitespace:
    name: Whitespace
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check whitespace
        run: git diff --check

  package:
    name: Package VSIX (${{ matrix.os }})
    needs:
      - python-test
      - python-quality
      - vscode-test
      - extension-audit
      - cmake-coverage
      - package-smoke
      - whitespace
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Check version metadata
        run: python scripts/check-version-consistency.py

      - name: Remove checked-in VSIX artifacts
        shell: bash
        run: rm -f plugin/*.vsix

      - name: Package VS Code extension
        working-directory: vscode-extension
        run: npm run package

      - name: Smoke packaged VSIX on Linux
        if: runner.os == 'Linux'
        working-directory: vscode-extension
        env:
          FREECM_SMOKE_VSCODE_VERSION: "1.129.1"
        run: xvfb-run -a npm run smoke:vsix

      - name: Smoke packaged VSIX
        if: runner.os != 'Linux'
        working-directory: vscode-extension
        env:
          FREECM_SMOKE_VSCODE_VERSION: "1.129.1"
        run: npm run smoke:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ runner.os }}-${{ runner.arch }}
          path: plugin/*.vsix
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.vsix
          generate_release_notes: true
